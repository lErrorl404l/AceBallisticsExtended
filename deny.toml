# Deny configuration for cargo-deny
# Blocks CI on license violations, known CVEs, and duplicate dependencies

[advisories]
ignore = [
    # lopdf — stack overflow via deeply nested PDF objects.
    # Blocked by printpdf which requires lopdf < 0.40.
    # Fix is in lopdf >= 0.42.0, waiting for printpdf to bump.
    "RUSTSEC-2026-0187",
    # proc-macro-error — unmaintained, no safe upgrade available.
    # Transitive via ouroboros → allsorts-azul → printpdf → ballistics-engine (dev).
    "RUSTSEC-2024-0370",
    # ttf-parser — unmaintained, no safe upgrade available.
    # Two versions: 0.20.0 via plotters, 0.25.1 via lopdf→printpdf.
    "RUSTSEC-2026-0192",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
    # getrandom 0.3.x used by ahash/rand, 0.4.x used by aws-lc-sys/jobserver
    { name = "getrandom" },
    # r-efi 5.x via getrandom 0.3, 6.x via getrandom 0.4
    { name = "r-efi" },
    # syn 2.x (phf_macros, wasm-bindgen, unicode deps) vs 3.x (serde_derive, thiserror)
    { name = "syn" },
    # rand_core 0.6.x via phf_generator→rand, 0.10.x via ballistics-engine→rand
    { name = "rand_core" },
    # windows-sys 0.52.x via ring, 0.61.x via clap/rustix/tokio etc.
    { name = "windows-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

[licenses]
allow = [
    "GPL-3.0-only",
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
# Note: ABE itself is GPL-3.0, but dependencies must use compatible permissive licenses.
# GPL-2.0/AGPL-3.0/GPL-3.0 are denied by omission from the allow list above.
confidence-threshold = 0.8
