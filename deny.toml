# Deny configuration for cargo-deny
# Blocks CI on license violations, known CVEs, and duplicate dependencies

[advisories]
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
]
deny = [
    "GPL-2.0",
    "AGPL-3.0",
    "GPL-3.0",
    # Note: ABE itself is GPL-3.0, but dependencies must use compatible permissive licenses
]
confidence-threshold = 0.8
