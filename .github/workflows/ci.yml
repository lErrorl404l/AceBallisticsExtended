name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  CARGO_HTTP_TIMEOUT: 60
  EXT_SRC: ext
  RUSTFLAGS: -D warnings

jobs:
  # ── MSRV (Minimum Supported Rust Version) ────────────────────────────
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(sed -n 's/^rust-version = "\(.*\)"/\1/p' ${{ env.EXT_SRC }}/Cargo.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extracted MSRV: $version"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}
      - run: cargo check --all-features
        working-directory: ${{ env.EXT_SRC }}

  # ── Unit tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}
      - run: cargo test --all-features
        working-directory: ${{ env.EXT_SRC }}

  # ── Lint (formatting, clippy, docs) ──────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}
      - run: cargo fmt --check
        working-directory: ${{ env.EXT_SRC }}
      - run: cargo clippy --all-features -- -D warnings
        working-directory: ${{ env.EXT_SRC }}
      - run: cargo doc --no-deps --all-features
        working-directory: ${{ env.EXT_SRC }}
        env:
          RUSTDOCFLAGS: -D warnings

  # ── Dependency audit ─────────────────────────────────────────────────
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Place deny.toml alongside Cargo.toml
        run: cp deny.toml ext/deny.toml
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ./ext/Cargo.toml
          arguments: --all-features

  # ── Cross-compile ────────────────────────────────────────────────────
  build:
    needs: [msrv, test, lint, deny]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            ext: .so
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            ext: .dll
            deps: mingw-w64
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            ext: .dll
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}
          key: ${{ matrix.target }}
      - if: matrix.deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ${{ matrix.deps }}
      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: ${{ env.EXT_SRC }}
      - run: cargo test --all-features
        working-directory: ${{ env.EXT_SRC }}
        if: matrix.os == 'windows-latest'
      - uses: actions/upload-artifact@v4
        with:
          name: abe_ext_${{ matrix.target }}
          path: ${{ env.EXT_SRC }}/target/${{ matrix.target }}/release/abe_ballistics_ext${{ matrix.ext }}

  # ── HEMTT build (Arma 3 mod packaging) ───────────────────────────────
  hemtt:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -sSf https://hemtt.dev/install.sh | sh
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download Linux ext
        uses: actions/download-artifact@v4
        with:
          name: abe_ext_x86_64-unknown-linux-gnu
          path: ext/

      - name: Download Windows ext
        uses: actions/download-artifact@v4
        with:
          name: abe_ext_x86_64-pc-windows-gnu
          path: ext/

      - run: hemtt build

  # ── Code coverage (main branch only) ─────────────────────────────────
  coverage:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - run: cargo tarpaulin --out Xml --engine llvm --all-features
        working-directory: ${{ env.EXT_SRC }}
      - uses: codecov/codecov-action@v5
        with:
          files: ${{ env.EXT_SRC }}/cobertura.xml
          fail_ci_if_error: false
