name: MSRV

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly: Monday 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  CARGO_HTTP_TIMEOUT: 60
  EXT_SRC: ext

jobs:
  # ── Minimum Supported Rust Version verification ──────────────────────
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(sed -n 's/^rust-version = "\(.*\)"/\1/p' ${{ env.EXT_SRC }}/Cargo.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "extracted msrv=$version"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}

      - name: cargo check (all features)
        run: cargo check --all-features
        working-directory: ${{ env.EXT_SRC }}

      - name: cargo test (all features)
        run: cargo test --all-features
        working-directory: ${{ env.EXT_SRC }}

      - name: cargo build (all features)
        run: cargo build --all-features
        working-directory: ${{ env.EXT_SRC }}
