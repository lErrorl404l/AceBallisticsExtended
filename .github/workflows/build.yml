name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  EXT_SRC: ext
  EXT_DLL: ext/abe_ballistics_ext.dll
  EXT_SO: ext/libabe_ballistics_ext.so

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Cache ───────────────────────────────────────────────────────
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.EXT_SRC }}/target
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Rust toolchain ──────────────────────────────────────────────
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-gnu

      # ── Cross-compile dependencies ──────────────────────────────────
      - name: Install cross-compile deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mingw-w64

      # ── Rust build ──────────────────────────────────────────────────
      - name: cargo test
        working-directory: ${{ env.EXT_SRC }}
        run: cargo test

      - name: Build Linux .so
        working-directory: ${{ env.EXT_SRC }}
        run: cargo build --release

      - name: Build Windows DLL (cross)
        working-directory: ${{ env.EXT_SRC }}
        run: cargo build --release --target x86_64-pc-windows-gnu

      # Copy binaries to locations expected by HEMTT [files]
      - name: Stage extension binaries
        run: |
          cp "${{ env.EXT_SRC }}/target/release/libabe_ballistics_ext.so" "${{ env.EXT_SO }}"
          cp "${{ env.EXT_SRC }}/target/x86_64-pc-windows-gnu/release/abe_ballistics_ext.dll" "${{ env.EXT_DLL }}"

      # ── HEMTT ───────────────────────────────────────────────────────
      - name: Setup HEMTT
        run: |
          curl -sSfL https://github.com/BrettMayson/HEMTT/releases/latest/download/hemtt-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin hemtt
          hemtt --version

      - name: HEMTT check
        run: hemtt check

      - name: HEMTT build
        run: hemtt build
