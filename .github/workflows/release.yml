name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  EXT_SRC: ext

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            ext: .so
          - target: x86_64-pc-windows-gnu
            ext: .dll
            deps: mingw-w64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-gnu
      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.EXT_SRC }}/target
            ~/.cargo/registry
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - if: matrix.deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ${{ matrix.deps }}
      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: ${{ env.EXT_SRC }}
      - uses: actions/upload-artifact@v4
        with:
          name: abe_ext_${{ matrix.target }}
          path: ${{ env.EXT_SRC }}/target/${{ matrix.target }}/release/abe_ballistics_ext${{ matrix.ext }}

  package:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -sSf https://hemtt.dev/install.sh | sh
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download Linux ext
        uses: actions/download-artifact@v4
        with:
          name: abe_ext_x86_64-unknown-linux-gnu
          path: ext/

      - name: Download Windows ext
        uses: actions/download-artifact@v4
        with:
          name: abe_ext_x86_64-pc-windows-gnu
          path: ext/

      - run: hemtt build

      - name: Package HEMTT build
        run: |
          mkdir -p dist
          (cd .hemttout/build && zip -r ../../dist/abe-${{ github.ref_name }}.zip .)

      - uses: actions/upload-artifact@v4
        with:
          name: abe-mod-${{ github.ref_name }}
          path: dist/abe-${{ github.ref_name }}.zip

  release:
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: abe-mod-${{ github.ref_name }}
          path: release/

      - uses: softprops/action-gh-release@v2
        with:
          name: ABE ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
