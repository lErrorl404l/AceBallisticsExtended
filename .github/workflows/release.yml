name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  CARGO_HTTP_TIMEOUT: 60
  EXT_SRC: ext
  RUSTFLAGS: -D warnings

jobs:
  # ── Build Rust extensions ────────────────────────────────────────────
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            ext: .so
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            ext: .dll
            deps: mingw-w64
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            ext: .dll
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.EXT_SRC }}
          key: ${{ matrix.target }}
      - if: matrix.deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ${{ matrix.deps }}
      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: ${{ env.EXT_SRC }}
      - run: cargo test --all-features
        working-directory: ${{ env.EXT_SRC }}
        if: matrix.os == 'windows-latest'
      - uses: actions/upload-artifact@v4
        with:
          name: abe_ext_${{ matrix.target }}
          path: ${{ env.EXT_SRC }}/target/${{ matrix.target }}/release/abe_ballistics_ext${{ matrix.ext }}

  # ── Package HEMTT mod ────────────────────────────────────────────────
  package:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: curl -sSf https://hemtt.dev/install.sh | sh
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download Linux ext
        uses: actions/download-artifact@v4
        with:
          name: abe_ext_x86_64-unknown-linux-gnu
          path: ext/

      - name: Download Windows ext
        uses: actions/download-artifact@v4
        with:
          name: abe_ext_x86_64-pc-windows-gnu
          path: ext/

      - run: hemtt build

      - name: Package HEMTT build
        run: |
          mkdir -p dist
          (cd .hemttout/build && zip -r ../../dist/abe-${{ github.ref_name }}.zip .)

      - uses: actions/upload-artifact@v4
        with:
          name: abe-mod-${{ github.ref_name }}
          path: dist/abe-${{ github.ref_name }}.zip

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: abe-mod-${{ github.ref_name }}
          path: release/

      - name: Detect pre-release from tag
        id: prerelease
        run: |
          tag="${{ github.ref_name }}"
          if echo "$tag" | grep -qiE '\-(alpha|beta|rc|pre|dev)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: ABE ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}

  # ── Publish to Steam Workshop (optional) ──────────────────────────
  steam-workshop:
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: abe-mod-${{ github.ref_name }}
          path: release/

      - name: Publish to Steam Workshop
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_ITEM_ID: ${{ secrets.STEAM_ITEM_ID }}
          STEAM_GUARD_CODE: ${{ secrets.STEAM_GUARD_CODE }}
        if: env.STEAM_USERNAME != '' && env.STEAM_PASSWORD != '' && env.STEAM_ITEM_ID != ''
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq steamcmd
          cat > release/item.vdf << VDF
          "workshopitem"
          {
            "appid" "107410"
            "publishedfileid" "${STEAM_ITEM_ID}"
            "contentfolder" "${GITHUB_WORKSPACE}/release/"
            "changenote" "Release ${{ github.ref_name }}"
          }
          VDF
          # Pipe credentials through stdin to avoid process-list exposure
          cat > release/steam_login.txt << LOGIN
          login ${STEAM_USERNAME} ${STEAM_PASSWORD}
          set_steam_guard_code ${STEAM_GUARD_CODE}
          workshop_build_item "${GITHUB_WORKSPACE}/release/item.vdf"
          quit
          LOGIN
          steamcmd +runscript "${GITHUB_WORKSPACE}/release/steam_login.txt"
