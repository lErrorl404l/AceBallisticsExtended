name: Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly: Monday 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  CARGO_HTTP_TIMEOUT: 60
  EXT_SRC: ext

jobs:
  # ── Undefined Behavior Detection ─────────────────────────────────────
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain + miri
        run: |
          rustup toolchain install nightly --component miri --allow-downgrade
          rustup default nightly
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: ${{ env.EXT_SRC }}
      - run: cargo miri test --all-features
        working-directory: ${{ env.EXT_SRC }}
        env:
          MIRIFLAGS: -Zmiri-permissive-provenance -Zmiri-symbolic-alignment-check

  # ── Security Audit (RustSec advisory database) ───────────────────────
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: ${{ env.EXT_SRC }}
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-audit
      - run: cargo audit
        working-directory: ${{ env.EXT_SRC }}
